<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>VAERO Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f3ee;
      color: #222;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    .label {
      font-size: 13px;
      color: #777;
      margin-bottom: 6px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .events {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    .event {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>VAERO Dashboard</h1>

  <div class="grid">
    <div class="card">
      <div class="label">Page Views</div>
      <div class="value" id="pageViews">0</div>
    </div>

    <div class="card">
      <div class="label">Tracking Submit</div>
      <div class="value" id="trackingSubmit">0</div>
    </div>

    <div class="card">
      <div class="label">Conversion Rate</div>
      <div class="value" id="conversionRate">0%</div>
    </div>
  </div>

  <div class="events">
    <h3>Son Eventler</h3>
    <div id="eventList"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://wpfiszzxlwkmaqcqmywa.supabase.co/rest/v1/events";
    const SUPABASE_KEY = "sb_publishable_eTspasegbb8PbX2hEGMD5w_ggrWRuYN";

    async function loadData() {
      const res = await fetch(SUPABASE_URL + "?select=*", {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        }
      });

      const data = await res.json();

      let pageViews = 0;
      let trackingSubmit = 0;

      data.forEach(e => {
        if (e.event_name === "page_view") pageViews++;
        if (e.event_name === "tracking_submit") trackingSubmit++;
      });

      const conversion = pageViews > 0 
        ? ((trackingSubmit / pageViews) * 100).toFixed(1) 
        : 0;

      document.getElementById("pageViews").innerText = pageViews;
      document.getElementById("trackingSubmit").innerText = trackingSubmit;
      document.getElementById("conversionRate").innerText = conversion + "%";

      const list = document.getElementById("eventList");
      list.innerHTML = "";

      data.slice(-10).reverse().forEach(e => {
        const div = document.createElement("div");
        div.className = "event";
        div.innerText = e.event_name + " — " + e.page;
        list.appendChild(div);
      });
    }

    loadData();
    setInterval(loadData, 5000);
  </script> 

</body>
</html>
