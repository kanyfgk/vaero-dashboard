<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAERO Dashboard</title>

<style>
body{
  font-family:Arial;
  background:#f5f3ee;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
}

.label{
  color:#777;
  font-size:13px;
}

.value{
  font-size:24px;
  font-weight:bold;
}

.panel{
  background:white;
  padding:20px;
  border-radius:15px;
}

.event{
  padding:10px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}
</style>
</head>

<body>

<h1>VAERO Dashboard</h1>

<div class="grid">
  <div class="card">
    <div class="label">Page Views</div>
    <div class="value" id="pageViews">0</div>
  </div>

  <div class="card">
    <div class="label">Tracking Submit</div>
    <div class="value" id="trackingSubmit">0</div>
  </div>

  <div class="card">
    <div class="label">Conversion Rate</div>
    <div class="value" id="conversionRate">0%</div>
  </div>

  <div class="card">
    <div class="label">Top Page</div>
    <div class="value" id="topPage">-</div>
  </div>
</div>

<div class="panel">
  <h3>Son Eventler</h3>
  <div id="eventList">Yükleniyor...</div>
</div>

<script>

const SUPABASE_URL = "https://wpfiszzxlwkmaqcqmywa.supabase.co/rest/v1/events";
const SUPABASE_KEY = "sb_publishable_eTspasegbb8PbX2hEGMD5w_ggrWRuYN";

async function loadData() {

  try {

    const res = await fetch(SUPABASE_URL + "?select=*", {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });

    const data = await res.json();

    console.log("DATA:", data); // debug

    let pageViews = 0;
    let trackingSubmit = 0;
    const pages = {};

    data.forEach(e => {

      const event = e.event_name || e.etkinlik_adi;
      const rawPage = e.page || e.sayfa || "/";
const pageName = rawPage.split("/").filter(Boolean).pop() || "home";
      const time = e.timestamp || e.zaman_damgasi;

      if (event === "page_view") pageViews++;
      if (event === "tracking_submit") trackingSubmit++;

      if (!pages[pageName]) pages[pageName] = 0;
      pages[pageName]++;

    });

    const conversion = pageViews > 0
      ? ((trackingSubmit / pageViews) * 100).toFixed(1) + "%"
      : "0%";

    

    document.getElementById("pageViews").innerText = pageViews;
    document.getElementById("trackingSubmit").innerText = trackingSubmit;
    document.getElementById("conversionRate").innerText = conversion;
  

    const list = document.getElementById("eventList");
    list.innerHTML = "";
const pageCounts = {};

data.forEach(e => {
  const eventName = e.event_name || e.etkinlik_adi;
  const pageName = e.page || e.sayfa || "/";
console.log("PAGE:", pageName);
  if (eventName === "page_view") {
    pageCounts[pageName] = (pageCounts[pageName] || 0) + 1;
  }
});

let topPage = "-";
let max = 0;

for (let page in pageCounts) {
  if (pageCounts[page] > max) {
    max = pageCounts[page];
    topPage = page;
  }
}

document.getElementById("topPage").innerText = topPage;
    if (!data || data.length === 0) {
      list.innerHTML = "Henüz veri yok";
      return;
    }

    data.slice(0, 10).forEach(e => {

      const event = e.event_name || e.etkinlik_adi;
      const page = e.page || e.sayfa || "/";
      const time = e.timestamp || e.zaman_damgasi;

      const div = document.createElement("div");
      div.className = "event";

      let timeText = "-";

      if (time) {
        const d = new Date(time);
        if (!isNaN(d)) {
          timeText = d.toLocaleString("tr-TR");
        }
      }

      div.innerText = event + " — " + page + " — " + timeText;

      list.appendChild(div);

    });

  } catch (err) {

    console.error(err);
    document.getElementById("eventList").innerText = "HATA: Veri çekilemedi";

  }

}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
