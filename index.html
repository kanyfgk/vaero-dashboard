<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAERO Dashboard</title>
<style>
body{margin:0;padding:32px;font-family:Arial,sans-serif;background:#f5f3ee;color:#222}
h1{margin-bottom:16px}
a{display:inline-block;margin-bottom:22px;padding:12px 18px;background:#222;color:white;text-decoration:none;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.card,.section{background:#ffffffcc;border-radius:18px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.04)}
.label{font-size:13px;color:#666;margin-bottom:8px}
.value{font-size:26px;font-weight:700}
.section{margin-top:20px}
.row{padding:10px 0;border-bottom:1px solid #eee;font-size:14px}
.small{color:#777;font-size:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<h1>VAERO Dashboard</h1>

<a href="https://project-dn5qk.vercel.app" target="_blank">Track Sayfasını Aç</a>

<div class="grid">
  <div class="card"><div class="label">Page Views</div><div id="pageViews" class="value">0</div></div>
  <div class="card"><div class="label">Tracking Submit</div><div id="trackingSubmit" class="value">0</div></div>
  <div class="card"><div class="label">Conversion Rate</div><div id="conversionRate" class="value">0%</div></div>
  <div class="card"><div class="label">Drop-off</div><div id="dropOff" class="value">0</div></div>
</div>

<div class="section">
  <h2>En Çok Seçilen Kargo Şirketleri</h2>
  <div id="carrierList">Yükleniyor...</div>
</div>

<div class="section">
  <h2>Son Eventler</h2>
  <div id="eventList">Yükleniyor...</div>
</div>

<script>
const SUPABASE_URL = "https://wpfiszzxlwkmaqcqmywa.supabase.co/rest/v1/events";
const SUPABASE_KEY = "sb_publishable_eTspasegbb8PbX2hEGMD5w_ggrWRuYN";

async function loadData(){
  const carrierList = document.getElementById("carrierList");
  const eventList = document.getElementById("eventList");

  try{
    const res = await fetch(SUPABASE_URL + "?select=*", {
      headers:{
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });

    const data = await res.json();

    if(!Array.isArray(data)){
      carrierList.innerHTML = "Veri alınamadı.";
      eventList.innerHTML = JSON.stringify(data);
      return;
    }

    data.sort((a,b)=>{
      const da = new Date(a.created_at || a.timestamp || 0);
      const db = new Date(b.created_at || b.timestamp || 0);
      return db - da;
    });

    let pageViews = 0;
    let trackingSubmit = 0;
    const carrierCounts = {};

    data.forEach(e=>{
      const name = e.event_name;
      const meta = e.meta || {};

      if(name === "page_view") pageViews++;
      if(name === "tracking_submit"){
        trackingSubmit++;
        const carrier = meta.carrier || "unknown";
        carrierCounts[carrier] = (carrierCounts[carrier] || 0) + 1;
      }
    });

    document.getElementById("pageViews").innerText = pageViews;
    document.getElementById("trackingSubmit").innerText = trackingSubmit;
    document.getElementById("conversionRate").innerText =
      pageViews > 0 ? ((trackingSubmit / pageViews) * 100).toFixed(1) + "%" : "0%";
    document.getElementById("dropOff").innerText = Math.max(pageViews - trackingSubmit, 0);

    carrierList.innerHTML = "";
    const sortedCarriers = Object.entries(carrierCounts).sort((a,b)=>b[1]-a[1]);

    if(sortedCarriers.length === 0){
      carrierList.innerHTML = "Henüz kargo seçimi yok.";
    } else {
      sortedCarriers.forEach(([carrier,count])=>{
        carrierList.innerHTML += <div class="row"><strong>${carrier}</strong> — ${count} kez</div>;
      });
    }

    eventList.innerHTML = "";
    data.slice(0,15).forEach(e=>{
      const time = e.created_at || e.timestamp || "-";
      const carrier = e.meta?.carrier ? " / " + e.meta.carrier : "";
      eventList.innerHTML += `
        <div class="row">
          <strong>${e.event_name}</strong>${carrier}<br>
          <span class="small">${e.page || "/"} — ${time}</span>
        </div>`;
    });

  }catch(err){
    carrierList.innerHTML = "Hata oluştu.";
    eventList.innerHTML = err.message;
  }
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
