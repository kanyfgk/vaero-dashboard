<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAERO Dashboard</title>
<style>
body{margin:0;padding:32px;font-family:Arial,sans-serif;background:#f5f3ee;color:#222}
h1{margin-bottom:16px}
a{display:inline-block;margin-bottom:22px;padding:12px 18px;background:#222;color:white;text-decoration:none;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.card,.section{background:#ffffffcc;border-radius:18px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.04)}
.label{font-size:13px;color:#666;margin-bottom:8px}
.value{font-size:26px;font-weight:700}
.section{margin-top:20px}
.row{padding:10px 0;border-bottom:1px solid #eee;font-size:14px}
.small{color:#777;font-size:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<h1>VAERO Dashboard</h1>

<a href="https://project-dn5qk.vercel.app" target="_blank">Track Sayfasını Aç</a>

<div class="grid">
  <div class="card"><div class="label">Page Views</div><div id="pageViews" class="value">0</div></div>
  <div class="card"><div class="label">Tracking Submit</div><div id="trackingSubmit" class="value">0</div></div>
  <div class="card"><div class="label">Conversion Rate</div><div id="conversionRate" class="value">0%</div></div>
  <div class="card"><div class="label">Drop-off</div><div id="dropOff" class="value">0</div></div>
</div>

<div class="section">
  <h2>En Çok Seçilen Kargo Şirketleri</h2>
  <div id="carrierList">Yükleniyor...</div>
</div>

<div class="section">
  <h2>Son Eventler</h2>
  <div id="eventList">Yükleniyor...</div>
</div>

<script>
const URL = "https://wpfiszzxlwkmaqcqmywa.supabase.co/rest/v1/events";
const KEY = "sb_publishable_eTspasegbb8PbX2hEGMD5w_ggrWRuYN";

async function loadData(){
  try{
    const res = await fetch(URL + "?select=id,created_at,event_name,page,meta", {
      headers:{
        apikey: KEY,
        Authorization: "Bearer " + KEY,
        "Content-Type": "application/json"
      }
    });

    const data = await res.json();
    console.log("DATA:", data);

    if(!Array.isArray(data)){
      document.getElementById("eventList").innerText = "Veri alınamadı";
      return;
    }

    let pageViews = 0;
    let submits = 0;
    let carriers = {};

    data.forEach(e=>{
      if(e.event_name === "page_view") pageViews++;
      if(e.event_name === "tracking_submit"){
        submits++;
        const c = e.meta?.carrier || "unknown";
        carriers[c] = (carriers[c] || 0) + 1;
      }
    });

    document.getElementById("pageViews").innerText = pageViews;
    document.getElementById("trackingSubmit").innerText = submits;
    document.getElementById("conversionRate").innerText =
      pageViews ? ((submits/pageViews)*100).toFixed(1)+"%" : "0%";
    document.getElementById("dropOff").innerText = pageViews - submits;

    const cl = document.getElementById("carrierList");
    cl.innerHTML = "";

    Object.entries(carriers)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([k,v])=>{
        cl.innerHTML += <div class="row">${k} — ${v}</div>;
      });

    const el = document.getElementById("eventList");
    el.innerHTML = "";

    data.slice(-15).reverse().forEach(e=>{
      el.innerHTML += `
        <div class="row">
          <b>${e.event_name}</b> ${e.meta?.carrier || ""}
          <br><span class="small">${e.page} — ${e.created_at}</span>
        </div>`;
    });

  }catch(err){
    console.error(err);
    document.getElementById("eventList").innerText = "Hata: " + err.message;
  }
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
